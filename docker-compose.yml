version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: ivs-db
    restart: always
    environment:
      POSTGRES_USER: ivsadmin
      POSTGRES_PASSWORD: dbpassword123
      POSTGRES_DB: ivsplatform
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ivs-backend
    restart: always
    env_file: ./backend/.env
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: ivs-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
