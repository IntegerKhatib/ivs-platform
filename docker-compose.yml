version: '3.8'
services:
  backend:
    build: ./backend
    container_name: ivs-backend
    restart: always
    env_file: ./backend/.env
  frontend:
    build: ./frontend
    container_name: ivs-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
