version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod    # <-- Added this line
    container_name: ivs-backend
    restart: always
    env_file: ./backend/.env
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod    # <-- Added this line
    container_name: ivs-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always